services:
  postgres:
    image: postgres:16-alpine
    container_name: tarteel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tarteel
      POSTGRES_PASSWORD: tarteel
      POSTGRES_DB: tarteel
    ports:
      - "5432:5432"
    volumes:
      - tarteel_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tarteel -d tarteel"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tarteel-redis
    restart: unless-stopped
    # Persist to disk so league sorted-sets / caches survive a restart.
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - tarteel_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tarteel_pgdata:
  tarteel_redisdata:
