services:
  postgres:
    image: postgres:16-alpine
    container_name: tarteel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tarteel
      POSTGRES_PASSWORD: tarteel
      POSTGRES_DB: tarteel
    ports:
      - "5432:5432"
    volumes:
      - tarteel_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tarteel -d tarteel"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tarteel-redis
    restart: unless-stopped
    # Persist to disk so league sorted-sets / caches survive a restart.
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - tarteel_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ASR — Whisper base fine-tuné Coran (tarteel-ai/whisper-base-ar-quran).
  # Le premier build télécharge et convertit le modèle (long, une seule fois).
  # Le backend le joint via ASR_URL=http://localhost:9000 en dev local.
  asr:
    build: ./asr
    container_name: tarteel-asr
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      # En dev, pas de clé. En prod, définir la même valeur que ASR_API_KEY du backend.
      ASR_API_KEY: ""
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5

volumes:
  tarteel_pgdata:
  tarteel_redisdata:
